<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/contact.css"> 
</head>
<body>
    <header>
        <div class="container">
            <h1>KOCHT</h1>
            <nav>
                <ul>
                    <li><a href="../index.html">Home</a></li>
                    <li><a href="../page/contact.html" class="active">Contact</a></li> 
                </ul>
            </nav>
        </div>
    </header>
    <section class="contact-info">
        <div class="container">
            <h2>Contact Us</h2>
        </div>    
    <section class="contact-layout">
        <div class="contact-details">
            <h3>Contact Details</h3>
            <p>contact@kochi.com<br>(555) 555-5555</p>
            <p><strong>Central H></strong>123 Avenue Street<br>City Township, CA 12345</p>
        </div>
        <form class="contact-form">
            <h3>Online Inquiry</h3>
            <label>Name<br>
            <input type="text" placeholder="Your Name" required>
            </label><br>
            <label>Email<br>
            <input type="email" placeholder="Your Email" required>
            </label><br>
            <label>Message<br>
            <textarea placeholder="Your Message" required></textarea>
            </label><br>
            <button type="submit" class="btn sumbit">Sumbit</button>
            <button type="reset" class="btn reset">Reset</button>
        </form>
    </section>
    <footer>
        <div class="container">

        </div>
    </footer>
